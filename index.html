<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style/style.css">
  <title>Product card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body style="font-family: Montserrat;">
  <div class="product-catalog__wrapper">
    <h1 class="product-catalog__title">Выбери свой продукт</h1>
    <div class="buttons">
      <button id="recolor-first-card-button">Перекрасить фон первой карточки</button>
      <button id="recolor-all-card-button">Перекрасить фон всех карточек</button>
      <button id="open-google-button">Открыть Google</button>
      <button id="button-recolor">Поменять цвет кнопки</button>
    </div>
    <div class="product-cards__wrapper" id="product-container">
    <template id="product-template">
      <div class="product-card__wrapper">
        <img src="" alt="" class="product-card__img">
        <p class="product-card__skin-type"></p>
        <h3 class="product-card__title"></h3>
        <p class="product-card__description"></p>
        <div class="card-list__wrapper">
          <span class="product-card__compound">Состав:</span>
          <ul class="product-card__list-of-ingredients"></ul>
        </div>
        <div class="product-card__price-wrapper">
         <span class="product-card__price-text">Цена</span>
         <span class="product-card__price"></span>
        </div>
      </div>
    </template>
    </div>
  </div>

<!-- Подключение файла как модуля -->
 
  <script type="module" src="homework-8.js"></script>
</body>
</html>
