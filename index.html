<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style/style.css">
  <title>Product card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body style="font-family: Montserrat;">
  <div class="product-catalog__wrapper">
    <h1 class="product-catalog__title">Выбери свой продукт</h1>
    <div class="buttons">
      <button id="recolor-first-card-button">Перекрасить фон первой карточки</button>
      <button id="recolor-all-card-button">Перекрасить фон всех карточек</button>
      <button id="open-google-button">Открыть Google</button>
      <button id="button-recolor">Поменять цвет кнопки</button>
      <button id="registration-button">Регистрация</button>
    </div>
    <div class="product-cards__wrapper" id="product-container">
    <template id="product-template">
      <div class="product-card__wrapper">
        <img src="" alt="" class="product-card__img">
        <p class="product-card__skin-type"></p>
        <h3 class="product-card__title"></h3>
        <p class="product-card__description"></p>
        <div class="card-list__wrapper">
          <span class="product-card__compound">Состав:</span>
          <ul class="product-card__list-of-ingredients"></ul>
        </div>
        <div class="product-card__price-wrapper">
         <span class="product-card__price-text">Цена</span>
         <span class="product-card__price"></span>
        </div>
      </div>
    </template>
    </div>
  </div>
  <footer class="footer">
    <div class="footer-container">
      <div class="title-wrapper">
        <h3 class="footer-title">Product Cards</h3>
        <p class="footer-title__text">У нас самые лучшие продукты для кожи!</p>
      </div>
      <div class="subscription-wrapper">
        <p class="subscription-text">Подпишись на наши акции:</p>
        <form class="input-group" id="email-form">
          <input type="email" name="email" class="subscription-input" placeholder="Введи Email...">
          <div class="input-divider"></div>
          <button type="submit" class="input-button">Подписаться</button>
        </form>
      </div>
      <div class="nav-wrapper">
        <nav>
          <ul>
            <li class="nav-title">Быстрые ссылки</li>
            <li class="nav-text">Главная</li>
            <li class="nav-text">Магазин</li>
            <li class="nav-text">Контакты</li>
          </ul>
        </nav>
      </div>
      <div class="social-icons">
        <img src="/images/tg-ico.png" alt="Telegram" class="social-ico">
        <img src="/images/vk-ico.png" alt="VK" class="social-ico">
      </div>
    </div>
    <div class="footer-line"></div>
    <div class="footer-bottom">
      <p class="footer-bottom__text">www.product-cards.com©all right reserve</p>
    </div>
  </footer>

<!-- 1. Создание файла main.js -->

  <script type="module" src="main.js"></script>
  <div class="overlay" id="overlay">
    <div class="modal" id="modal">
      <button id="modal-exit__button">X</button>
      <h3 class="modal-title">Регистрация</h3>
      <form class="registration-form" id="registration-form">
        <label>
          Имя
          <input type="text" name="first-name" class="first-name" placeholder="Введите имя" required>
        </label>
        <label>
          Фамилия
          <input type="text" name="last-name" class="last-name" placeholder="Введите фамилию" required>
        </label>
        <label>
          Дата рождения
          <input type="date" name="birth-date" class="birth-date" placeholder="Укажите дату рождения" required>
        </label>
        <label>
          Логин
          <input type="text" name="login" class="login" placeholder="Введите логин" required>
        </label>
        <label>
          Пароль
          <input type="password" name="password" class="password" placeholder="Введите пароль" required>
        </label>
        <label>
          Подтвердить пароль
          <input type="password" name="password-confirm" class="password-confirm" placeholder="Повторите пароль" required>
        </label>
        <button type="submit" class="reg-button" id="reg-button">Зарегистрироваться</button>
      </form>
    </div>
  </div>
<script type="module" src="homework-11.js"></script>
</body>
</html>
